apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: ha
data:
  mosquitto.conf: |
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
    listener 1883
    allow_anonymous false
    password_file /mosquitto/config/passwordfile
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-data
  namespace: ha
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: ha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
    spec:
      initContainers:
      - name: setup-mosquitto-config
        image: eclipse-mosquitto:2
        env:
        - name: MQTT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mqtt-auth
              key: MQTT_USERNAME
        - name: MQTT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mqtt-auth
              key: MQTT_PASSWORD
        command:
        - /bin/sh
        - -c
        - |
          cp /config-src/mosquitto.conf /work/mosquitto.conf
          mosquitto_passwd -b -c /work/passwordfile "$MQTT_USERNAME" "$MQTT_PASSWORD"
        volumeMounts:
        - name: config-src
          mountPath: /config-src
        - name: config-work
          mountPath: /work
      containers:
      - name: mosquitto
        image: eclipse-mosquitto:2
        ports:
        - containerPort: 1883
        volumeMounts:
        - name: config-work
          mountPath: /mosquitto/config
        - name: data
          mountPath: /mosquitto/data
      volumes:
      - name: config-src
        configMap:
          name: mosquitto-config
      - name: config-work
        emptyDir: {}
      - name: data
        persistentVolumeClaim:
          claimName: mosquitto-data
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: ha
spec:
  type: NodePort
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: 1883
    nodePort: 31883
